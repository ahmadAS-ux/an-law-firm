services:
  - type: web
    name: an-law-firm
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: an-law-firm-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://an-law-firm.onrender.com

databases:
  - name: an-law-firm-db
    plan: free
