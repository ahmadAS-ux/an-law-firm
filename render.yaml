services:
  - type: web
    name: an-law-firm
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && node node_modules/prisma/build/index.js generate && node node_modules/next/dist/bin/next build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: an-law-firm-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: an-law-firm-db
    plan: free
    region: oregon
